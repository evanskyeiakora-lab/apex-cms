<style>
    body{
        background: linear-gradient(135deg, #0d6efd, #0a2540);
        color: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', sans-serif;
    }

    .construction-box{
        max-width: 800px;
        text-align: center;
        padding: 50px;
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        box-shadow: 0 15px 40px rgba(0,0,0,.3);
    }

    .logo{
        width: 90px;
        margin-bottom: 20px;
    }

    h1{
        font-size: 3rem;
        font-weight: 700;
    }

    .countdown div{
        background: rgba(255,255,255,0.15);
        padding: 15px;
        border-radius: 10px;
        min-width: 90px;
    }

    .countdown span{
        display: block;
        font-size: 2rem;
        font-weight: bold;
    }

    .gear{
        font-size: 4rem;
        animation: spin 5s linear infinite;
    }

    @keyframes spin{
        from{transform:rotate(0deg);}
        to{transform:rotate(360deg);}
    }

    .social a{
        color:#fff;
        text-decoration:none;
        margin:0 10px;
        font-size:1.2rem;
    }

    .social a:hover{
        color:#ffc107;
    }

    @media(max-width:768px){
        h1{
            font-size:2rem;
        }

        .construction-box{
            padding:30px 20px;
        }
    }
</style>
